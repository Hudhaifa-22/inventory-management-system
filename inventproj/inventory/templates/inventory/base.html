<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f6f9;
	}

        table {
            width: 100%;
            border-collapse: collapse;
	    border : 5px solid green;
	}
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        a {
            text-decoration: none;
            padding: 5px 10px;
            background: #007bff;
            color: white;
            border-radius: 4px;
        }
	.navbar {
            background-color: #007bff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
	button {
            padding: 10px 18px;
            border: none;
            background: green;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .message {
            color: red;
        }
	input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Inventory Management System</h1>
<div class="navbar">
        <a href="{% url 'product_list' %}">Products</a>
        {% if user.is_authenticated %}
        <form action="{% url 'logout' %}"
        method="post"
        style="display:inline;">
        {% csrf_token %}
        <button type="submit">Logout</button>
        </form>

        <span style="color:white;">Welcome, {{ user.username }}</span>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}

</div>
{% if messages %}
{% for message in messages %}
<div style="
    padding:10px;
    margin-bottom:15px;
    background:#ffdddd;
    border-left:5px solid red;
    color:#333;">
    {{ message }}
</div>

{% endfor %}
{% endif %}
{% block content %}
{% endblock %}

</body>
</html>
